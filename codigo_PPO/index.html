<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Expense Tracker</title>
    <link rel="stylesheet" href="main.css" />
  </head>

  <body>
    <div id="template">
      <h1>Smart Expense Tracker</h1>
    </div>
    <div class="Nomecategoria">
      <input placeholder="Nome da categoria" />
      <button id="adicionar-categoria">adicionar</button>
    </div>
    <div class="Menu">
      <div class="info">
        <div class="nome">
          <h1>Categoria nova</h1>
        </div>
        <div class="div-verde1"></div>
        <div class="div-excluir-categoria">
          <button id="excluir-categoria">excluir</button>
        </div>
      </div>
      <div class="personalizar">
        <input placeholder="Nome do Item" />
        <input placeholder="Valor" />
        <input placeholder="Data" />
        <button id="excluir-item">excluir</button>
      </div>
      <div class="div-item">
        <input id="adicao-item"type="button" value="adicionar um Item" />
        <h2 id="Valores">Valor total dos itens:</h2>
      </div>
    </div>
    <h1 id="Valor_total">Valor total:</h1>
  </body>
</html>
